"CS2NavBot"
{
   // Куда CS2 будет слать POST-запросы с состоянием игры
   "uri"        "http://127.0.0.1:3000"

   // Таймаут соединения (сек)
   "timeout"    "5.0"

   // Heartbeat каждые N сек (пустой payload для проверки связи)
   "heartbeat"  "10.0"

   // Буферизация: CS2 не шлёт чаще чем раз в N сек
   "buffer"     "0.1"

   // Минимальный интервал между обновлениями (сек)
   "throttle"   "0.1"

   "data"
   {
      "provider"        "1"
      "map"             "1"
      "round"           "1"
      "player_id"       "1"
      "player_state"    "1"
      "player_weapons"  "1"
      "player_position" "1"
   }

   //------------------------------------------------------------------
   // OrchestrAI Hub — шпаргалка запуска main.py (AI Aim)
   //
   // CS2 для GSI читает только uri / timeout / buffer / throttle / heartbeat / data.
   // Блок ниже — не ключи движка, а подсказка аргументов командной строки (копируй в терминал или панель).
   //
   // team (враги для наводки):           CT | T     →  --team CT   или  --team T
   // aim_mouse_gain (скорость мыши):     число      →  --aim-gain 1.35
   // closed_loop_max_step_logical (px):  число      →  --max-step-logical 96
   //   (учитывается только при use_closed_loop=true в _client/_bot/config.py)
   // preview (окно OpenCV):              true|false
   //   true  — превью по умолчанию (флаг не указывать)
   //   false — без окна → добавь: --no-preview
   //
   // Примеры:
   //   py main.py --team CT --aim-gain 1.35 --max-step-logical 96
   //   py main.py --team T --aim-gain 2.0 --max-step-logical 120 --no-preview
   //------------------------------------------------------------------
}
